<?xml version="1.0" encoding="UTF-8"?>
<!--
  console-pgp-chat — project header / mascot banner
  "Locky" — an anthropomorphized padlock at a terminal, the project mascot.
  Canvas: 900 × 300  |  Dark GitHub theme
-->
<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg"
     font-family="'Courier New', Courier, monospace">
<defs>

  <!-- Background gradient -->
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"
                  gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>

  <!-- Grid pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none"
          stroke="#161d27" stroke-width="0.6"/>
  </pattern>

  <!-- Mascot inner glow -->
  <radialGradient id="lockGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#3fb950" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
  </radialGradient>

  <!-- Layer 1 bar gradient -->
  <linearGradient id="l1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.1"/>
  </linearGradient>
  <!-- Layer 2 bar gradient -->
  <linearGradient id="l2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
  </linearGradient>
  <!-- Layer 3 bar gradient -->
  <linearGradient id="l3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e3b341" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e3b341" stop-opacity="0.08"/>
  </linearGradient>
  <!-- Layer 4 bar gradient -->
  <linearGradient id="l4" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3fb950" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#3fb950" stop-opacity="0.08"/>
  </linearGradient>

  <!-- Mesh link gradient -->
  <linearGradient id="meshLink" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#1f6feb" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.9"/>
  </linearGradient>

  <!-- Arrow markers -->
  <marker id="aB" markerWidth="6" markerHeight="6"
          refX="5" refY="3" orient="auto">
    <path d="M0,0 L0,6 L6,3 z" fill="#1f6feb" opacity="0.85"/>
  </marker>
  <marker id="aBr" markerWidth="6" markerHeight="6"
          refX="1" refY="3" orient="auto">
    <path d="M6,0 L6,6 L0,3 z" fill="#1f6feb" opacity="0.85"/>
  </marker>

</defs>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BACKGROUND
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<rect width="900" height="300" fill="url(#bg)"/>
<rect width="900" height="300" fill="url(#grid)"/>

<!-- Top / bottom accent lines -->
<rect width="900" height="2"   fill="#1f6feb" opacity="0.75"/>
<rect y="298" width="900" height="2" fill="#1f6feb" opacity="0.75"/>

<!-- Panel dividers -->
<line x1="272" y1="16" x2="272" y2="284" stroke="#21262d" stroke-width="1"/>
<line x1="632" y1="16" x2="632" y2="284" stroke="#21262d" stroke-width="1"/>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     LEFT PANEL — "Locky" mascot
     Centered at (136, 150)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<g transform="translate(136,150)">

  <!-- Ambient glow behind the lock -->
  <circle r="95" fill="url(#lockGlow)"/>

  <!-- ── Antenna / signal ── -->
  <line x1="0" y1="-82" x2="0" y2="-100"
        stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="0" cy="-105" r="4.5" fill="#3fb950" opacity="0.9"/>
  <!-- Signal arcs -->
  <path d="M-9,-94  Q0,-107  9,-94"  fill="none" stroke="#3fb950"
        stroke-width="1.5" opacity="0.55"/>
  <path d="M-16,-87 Q0,-110 16,-87" fill="none" stroke="#3fb950"
        stroke-width="1"   opacity="0.3"/>

  <!-- ── Network arms (left & right connection dots) ── -->
  <line x1="-57" y1="12" x2="-86" y2="12"
        stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="-91" cy="12" r="4.5" fill="#1f6feb" opacity="0.65"/>
  <circle cx="-91" cy="12" r="8"   fill="none" stroke="#1f6feb"
          stroke-width="0.8" opacity="0.25"/>

  <line x1="57" y1="12" x2="86" y2="12"
        stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="91" cy="12" r="4.5" fill="#1f6feb" opacity="0.65"/>
  <circle cx="91" cy="12" r="8"   fill="none" stroke="#1f6feb"
          stroke-width="0.8" opacity="0.25"/>

  <!-- ── Shackle (lock arch) ── -->
  <!-- Outer stroke = green body -->
  <path d="M-33,7 L-33,-48 Q-33,-80 0,-80 Q33,-80 33,-48 L33,7"
        fill="none" stroke="#3fb950" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner cutout (hollow arch) -->
  <path d="M-33,7 L-33,-48 Q-33,-80 0,-80 Q33,-80 33,-48 L33,7"
        fill="none" stroke="#0d1117" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Lock body ── -->
  <rect x="-52" y="7" width="104" height="75" rx="11"
        fill="#0c1219" stroke="#3fb950" stroke-width="2.5"/>

  <!-- ── Inner screen / face ── -->
  <rect x="-41" y="16" width="82" height="57" rx="6"
        fill="#060c14" stroke="#1f6feb" stroke-width="1"/>

  <!-- Scanlines -->
  <line x1="-41" y1="25" x2="41" y2="25" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="-41" y1="33" x2="41" y2="33" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="-41" y1="41" x2="41" y2="41" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="-41" y1="49" x2="41" y2="49" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="-41" y1="57" x2="41" y2="57" stroke="#1a3050" stroke-width="0.5"/>
  <line x1="-41" y1="65" x2="41" y2="65" stroke="#1a3050" stroke-width="0.5"/>

  <!-- Screen text lines -->
  <text x="-35" y="32"  font-size="9"  fill="#3fb950" font-weight="bold">&gt; SECURE_</text>
  <text x="-35" y="47"  font-size="8"  fill="#56d364" opacity="0.8">SIG:OK  ENC:OK</text>
  <text x="-35" y="60"  font-size="8"  fill="#56d364" opacity="0.7">FP: a1b2c3de</text>
  <!-- Blinking cursor -->
  <rect x="-35" y="65"  width="7" height="9" rx="1" fill="#3fb950" opacity="0.9"/>

  <!-- ── Keyhole ── -->
  <circle cx="0" cy="44" r="7"   fill="#1f6feb" opacity="0.85"/>
  <!-- Keyhole slot -->
  <polygon points="0,51 -4.5,66 4.5,66" fill="#1f6feb" opacity="0.85"/>

  <!-- ── Little feet (bottom of lock body) ── -->
  <rect x="-20" y="80"  width="12" height="8" rx="3"
        fill="#1a2535" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
  <rect x="8"   y="80"  width="12" height="8" rx="3"
        fill="#1a2535" stroke="#3fb950" stroke-width="1" opacity="0.8"/>

</g>

<!-- Mascot caption -->
<text x="136" y="268" text-anchor="middle" font-size="9" fill="#484f58">
  Locky — mascot
</text>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     CENTER PANEL — title, tagline, layers, badges
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

<!-- Title -->
<text x="452" y="44" text-anchor="middle" font-size="25"
      font-weight="bold" fill="#e6edf3" letter-spacing="1">
  console-pgp-chat
</text>
<!-- Title underline -->
<line x1="286" y1="52" x2="618" y2="52" stroke="#21262d" stroke-width="1"/>

<!-- Tagline -->
<text x="452" y="68" text-anchor="middle" font-size="11" fill="#8b949e">
  peer-to-peer  ·  end-to-end encrypted  ·  no servers
</text>

<!-- Badge row 1 — crypto -->
<g transform="translate(290,82)">
  <rect width="84" height="18" rx="4"
        fill="#1a0a38" stroke="#8b5cf6" stroke-width="1"/>
  <text x="42" y="13" text-anchor="middle" font-size="9" fill="#d2a8ff">PGP E2E</text>
</g>
<g transform="translate(380,82)">
  <rect width="84" height="18" rx="4"
        fill="#0d1f3d" stroke="#1f6feb" stroke-width="1"/>
  <text x="42" y="13" text-anchor="middle" font-size="9" fill="#79c0ff">AES-256</text>
</g>
<g transform="translate(470,82)">
  <rect width="144" height="18" rx="4"
        fill="#0d1f3d" stroke="#1f6feb" stroke-width="1"/>
  <text x="72" y="13" text-anchor="middle" font-size="9" fill="#79c0ff">ECDH Curve25519</text>
</g>

<!-- Badge row 2 — network -->
<g transform="translate(290,106)">
  <rect width="120" height="18" rx="4"
        fill="#0d1f3d" stroke="#1f6feb" stroke-width="1"/>
  <text x="60" y="13" text-anchor="middle" font-size="9" fill="#79c0ff">TCP + QUIC/UDP</text>
</g>
<g transform="translate(416,106)">
  <rect width="108" height="18" rx="4"
        fill="#1a0a38" stroke="#8b5cf6" stroke-width="1"/>
  <text x="54" y="13" text-anchor="middle" font-size="9" fill="#d2a8ff">Kademlia DHT</text>
</g>
<g transform="translate(530,106)">
  <rect width="84" height="18" rx="4"
        fill="#2d1f00" stroke="#e3b341" stroke-width="1"/>
  <text x="42" y="13" text-anchor="middle" font-size="9" fill="#e3b341">Zero Trust</text>
</g>

<!-- Badge row 3 — features -->
<g transform="translate(290,130)">
  <rect width="100" height="18" rx="4"
        fill="#0d2d15" stroke="#3fb950" stroke-width="1"/>
  <text x="50" y="13" text-anchor="middle" font-size="9" fill="#56d364">File Transfer</text>
</g>
<g transform="translate(396,130)">
  <rect width="114" height="18" rx="4"
        fill="#1a0a38" stroke="#8b5cf6" stroke-width="1"/>
  <text x="57" y="13" text-anchor="middle" font-size="9" fill="#d2a8ff">4-Layer Security</text>
</g>
<g transform="translate(516,130)">
  <rect width="98" height="18" rx="4"
        fill="#2d1f00" stroke="#e3b341" stroke-width="1"/>
  <text x="49" y="13" text-anchor="middle" font-size="9" fill="#e3b341">Pure Rust</text>
</g>

<!-- Security layer stack diagram -->
<text x="452" y="168" text-anchor="middle" font-size="9" fill="#484f58">
  ── security layers (outermost to innermost) ──
</text>

<!-- Layer 1: Noise/QUIC transport -->
<rect x="290" y="172" width="324" height="14" rx="3" fill="url(#l1)"/>
<text x="298" y="183" font-size="8" fill="#79c0ff">Noise/QUIC  transport encryption</text>

<!-- Layer 2: room_cipher -->
<rect x="298" y="188" width="308" height="14" rx="3" fill="url(#l2)"/>
<text x="306" y="199" font-size="8" fill="#d2a8ff">room_cipher  PGP symmetric AES-256 (room passphrase)</text>

<!-- Layer 3: EdDSA signature -->
<rect x="306" y="204" width="292" height="14" rx="3" fill="url(#l3)"/>
<text x="314" y="215" font-size="8" fill="#e3b341">EdDSA signature  authenticity guarantee</text>

<!-- Layer 4: ECDH public-key encryption -->
<rect x="314" y="220" width="276" height="14" rx="3" fill="url(#l4)"/>
<text x="322" y="231" font-size="8" fill="#56d364">ECDH public-key encryption  per-recipient confidentiality</text>

<!-- Trust system note -->
<text x="452" y="254" text-anchor="middle" font-size="9" fill="#484f58">
  trust system: pending · deferred · approved · rejected · nuke
</text>
<text x="452" y="268" text-anchor="middle" font-size="9" fill="#484f58">
  replay protection · TOFU detection · fingerprint cross-check
</text>


<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     RIGHT PANEL — P2P mesh (no central server)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

<!-- Triangle nodes:
     Alice: top-center  (764, 88)
     Bob:   bottom-left (703, 205)
     Carol: bottom-right (826, 205) -->

<!-- ── Connections ── -->

<!-- Alice → Bob -->
<line x1="745" y1="104" x2="712" y2="189"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.75" marker-end="url(#aB)"/>
<!-- Bob → Alice -->
<line x1="714" y1="187" x2="747" y2="102"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.45" marker-end="url(#aB)"/>

<!-- Alice → Carol -->
<line x1="783" y1="104" x2="818" y2="189"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.75" marker-end="url(#aB)"/>
<!-- Carol → Alice -->
<line x1="816" y1="187" x2="781" y2="102"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.45" marker-end="url(#aB)"/>

<!-- Bob → Carol -->
<line x1="722" y1="205" x2="814" y2="205"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.75" marker-end="url(#aB)"/>
<!-- Carol → Bob -->
<line x1="814" y1="207" x2="722" y2="207"
      stroke="url(#meshLink)" stroke-width="1.5" stroke-dasharray="5,3"
      opacity="0.45" marker-end="url(#aB)"/>

<!-- ── Mini padlocks on each link ── -->
<!-- Alice-Bob link lock -->
<g transform="translate(724,147)">
  <rect x="-8" y="-6" width="16" height="12" rx="2"
        fill="#0d1117" stroke="#8b5cf6" stroke-width="1.2"/>
  <path d="M-4,-6 L-4,-11 Q0,-16 4,-11 L4,-6"
        fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <circle cx="0" cy="2" r="2.2" fill="#8b5cf6"/>
</g>

<!-- Alice-Carol link lock -->
<g transform="translate(802,147)">
  <rect x="-8" y="-6" width="16" height="12" rx="2"
        fill="#0d1117" stroke="#8b5cf6" stroke-width="1.2"/>
  <path d="M-4,-6 L-4,-11 Q0,-16 4,-11 L4,-6"
        fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <circle cx="0" cy="2" r="2.2" fill="#8b5cf6"/>
</g>

<!-- Bob-Carol link lock -->
<g transform="translate(764,198)">
  <rect x="-8" y="-6" width="16" height="12" rx="2"
        fill="#0d1117" stroke="#8b5cf6" stroke-width="1.2"/>
  <path d="M-4,-6 L-4,-11 Q0,-16 4,-11 L4,-6"
        fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <circle cx="0" cy="2" r="2.2" fill="#8b5cf6"/>
</g>

<!-- ── Ghost "NO SERVER" in triangle center ── -->
<g transform="translate(764,158)" opacity="0.17">
  <rect x="-24" y="-18" width="48" height="36" rx="5"
        fill="none" stroke="#f85149" stroke-width="1.5"
        stroke-dasharray="4,2"/>
  <text x="0" y="-4"  text-anchor="middle" font-size="8" fill="#f85149">SERVER</text>
  <text x="0" y="8"   text-anchor="middle" font-size="7" fill="#f85149">not here</text>
  <line x1="-24" y1="-18" x2="24" y2="18" stroke="#f85149" stroke-width="2"/>
  <line x1="24"  y1="-18" x2="-24" y2="18" stroke="#f85149" stroke-width="2"/>
</g>

<!-- ── Node: Alice (top) ── -->
<rect x="742" y="64" width="44" height="36" rx="7"
      fill="#0c1219" stroke="#3fb950" stroke-width="1.8"/>
<rect x="746" y="68" width="36" height="28" rx="4"
      fill="#060c14" stroke="#1f6feb" stroke-width="0.8"/>
<text x="764" y="78"  text-anchor="middle" font-size="7"  fill="#3fb950">&gt;_</text>
<text x="764" y="90"  text-anchor="middle" font-size="6"  fill="#3fb950" opacity="0.7">alice</text>
<text x="764" y="112" text-anchor="middle" font-size="9"  fill="#56d364">Alice</text>

<!-- ── Node: Bob (bottom-left) ── -->
<rect x="681" y="183" width="44" height="36" rx="7"
      fill="#0c1219" stroke="#3fb950" stroke-width="1.8"/>
<rect x="685" y="187" width="36" height="28" rx="4"
      fill="#060c14" stroke="#1f6feb" stroke-width="0.8"/>
<text x="703" y="197"  text-anchor="middle" font-size="7"  fill="#3fb950">&gt;_</text>
<text x="703" y="209"  text-anchor="middle" font-size="6"  fill="#3fb950" opacity="0.7">bob</text>
<text x="703" y="233"  text-anchor="middle" font-size="9"  fill="#56d364">Bob</text>

<!-- ── Node: Carol (bottom-right) ── -->
<rect x="804" y="183" width="44" height="36" rx="7"
      fill="#0c1219" stroke="#3fb950" stroke-width="1.8"/>
<rect x="808" y="187" width="36" height="28" rx="4"
      fill="#060c14" stroke="#1f6feb" stroke-width="0.8"/>
<text x="826" y="197"  text-anchor="middle" font-size="7"  fill="#3fb950">&gt;_</text>
<text x="826" y="209"  text-anchor="middle" font-size="6"  fill="#3fb950" opacity="0.7">carol</text>
<text x="826" y="233"  text-anchor="middle" font-size="9"  fill="#56d364">Carol</text>

<!-- Right panel label -->
<text x="764" y="258" text-anchor="middle" font-size="9" fill="#484f58">
  p2p mesh  ·  no hub  ·  no account
</text>
<text x="764" y="271" text-anchor="middle" font-size="8" fill="#3d444d">
  gossipsub + kademlia DHT
</text>

</svg>
