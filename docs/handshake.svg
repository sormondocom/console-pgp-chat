<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">

  <!-- Defs -->
  <defs>
    <marker id="arrow-blue"  markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56d364"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">Peer Connection, Key Exchange &amp; Trust Handshake</text>

  <!-- ── Actor labels ── -->
  <rect x="50"  y="55" width="140" height="44" rx="8" fill="#1f6feb" fill-opacity="0.25" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="120" y="82" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="bold">Alice</text>

  <rect x="375" y="55" width="150" height="44" rx="8" fill="#3d2b5e" fill-opacity="0.4" stroke="#8957e5" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" fill="#d2a8ff" font-size="14" font-weight="bold">Network / DHT</text>

  <rect x="710" y="55" width="140" height="44" rx="8" fill="#1f6feb" fill-opacity="0.25" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="780" y="82" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="bold">Bob</text>

  <!-- Lifelines -->
  <line x1="120" y1="99"  x2="120" y2="750" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="450" y1="99"  x2="450" y2="750" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="780" y1="99"  x2="780" y2="750" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── Phase 0: Room passphrase (out-of-band) ── -->
  <rect x="50" y="110" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="125" text-anchor="middle" fill="#e3b341" font-size="11">Phase 0 — Out-of-Band: Exchange Room Passphrase (Signal, QR, voice, …)</text>

  <line x1="120" y1="148" x2="770" y2="148" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="8,4" marker-end="url(#arrow-yellow)"/>
  <text x="450" y="141" text-anchor="middle" fill="#e3b341" font-size="11">room_passphrase = "hunter2"  (never sent over the network)</text>

  <!-- ── Phase 1: TCP + Noise ── -->
  <rect x="50" y="165" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="180" text-anchor="middle" fill="#8b949e" font-size="11">Phase 1 — Transport Layer: TCP + Noise Protocol  |  QUIC + TLS 1.3</text>

  <!-- TCP SYN -->
  <line x1="120" y1="203" x2="770" y2="203" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="430" y="196" text-anchor="middle" fill="#58a6ff" font-size="11">TCP SYN  →  (or QUIC Initial — looks like HTTPS/UDP)</text>

  <!-- TCP SYN/ACK -->
  <line x1="780" y1="222" x2="130" y2="222" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="430" y="215" text-anchor="middle" fill="#58a6ff" font-size="11">←  TCP SYN/ACK</text>

  <!-- Noise XX msg1 -->
  <line x1="120" y1="244" x2="770" y2="244" stroke="#56d364" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="430" y="237" text-anchor="middle" fill="#56d364" font-size="11">Noise XX msg1  (ephemeral key e_A)  →</text>

  <!-- Noise XX msg2 -->
  <line x1="780" y1="263" x2="130" y2="263" stroke="#56d364" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="430" y="256" text-anchor="middle" fill="#56d364" font-size="11">←  Noise XX msg2  (e_B, static key s_B, AEAD ciphertext)</text>

  <!-- Noise XX msg3 -->
  <line x1="120" y1="282" x2="770" y2="282" stroke="#56d364" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="430" y="275" text-anchor="middle" fill="#56d364" font-size="11">Noise XX msg3  (static key s_A, AEAD ciphertext)  →</text>

  <!-- Noise result -->
  <rect x="200" y="292" width="500" height="24" rx="4" fill="#1a2d1a" stroke="#56d364" stroke-width="0.8"/>
  <text x="450" y="308" text-anchor="middle" fill="#56d364" font-size="11">✓  Encrypted tunnel established  —  session key = X25519(e_A, e_B) ⊕ …</text>

  <!-- ── Phase 2: Gossipsub subscribe ── -->
  <rect x="50" y="327" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="342" text-anchor="middle" fill="#8b949e" font-size="11">Phase 2 — Gossipsub Subscribe (room topic)</text>

  <line x1="120" y1="362" x2="440" y2="362" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="268" y="355" text-anchor="middle" fill="#d2a8ff" font-size="11">SUBSCRIBE "secret-ops"  →</text>

  <line x1="780" y1="380" x2="460" y2="380" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="632" y="373" text-anchor="middle" fill="#d2a8ff" font-size="11">←  SUBSCRIBE "secret-ops"</text>

  <!-- ── Phase 3: AnnounceKey ── -->
  <rect x="50" y="399" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="414" text-anchor="middle" fill="#8b949e" font-size="11">Phase 3 — PGP Key Announcement  (room-cipher AES-256 wrapped)</text>

  <!-- Alice announces -->
  <line x1="120" y1="435" x2="770" y2="435" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="430" y="428" text-anchor="middle" fill="#ffa657" font-size="11">room_seal( SignedChatMessage{ AnnounceKey{ pub_A, "Alice" }, sig_A } )  →</text>

  <!-- Bob announces -->
  <line x1="780" y1="453" x2="130" y2="453" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="430" y="446" text-anchor="middle" fill="#ffa657" font-size="11">←  room_seal( SignedChatMessage{ AnnounceKey{ pub_B, "Bob" }, sig_B } )</text>

  <!-- ── Phase 4: Trust approval ── -->
  <rect x="50" y="470" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="485" text-anchor="middle" fill="#8b949e" font-size="11">Phase 4 — Trust Decision  (manual, never auto-trusted)</text>

  <!-- Bob's decision box -->
  <rect x="590" y="498" width="220" height="64" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="700" y="514" text-anchor="middle" fill="#e3b341" font-size="10">room_open( payload )</text>
  <text x="700" y="528" text-anchor="middle" fill="#8b949e" font-size="10">verify sig_A  ✓</text>
  <text x="700" y="542" text-anchor="middle" fill="#8b949e" font-size="10">fp_header == key.fingerprint()  ✓</text>
  <text x="700" y="556" text-anchor="middle" fill="#e3b341" font-size="10">[?] Approve Alice? [y] / [x]</text>
  <line x1="780" y1="498" x2="780" y2="498" stroke="none"/>

  <!-- Alice's decision box -->
  <rect x="90" y="498" width="220" height="64" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="200" y="514" text-anchor="middle" fill="#e3b341" font-size="10">room_open( payload )</text>
  <text x="200" y="528" text-anchor="middle" fill="#8b949e" font-size="10">verify sig_B  ✓</text>
  <text x="200" y="542" text-anchor="middle" fill="#8b949e" font-size="10">fp_header == key.fingerprint()  ✓</text>
  <text x="200" y="556" text-anchor="middle" fill="#e3b341" font-size="10">[?] Approve Bob? [y] / [x]</text>

  <!-- Press y lines -->
  <line x1="120" y1="575" x2="120" y2="590" stroke="#56d364" stroke-width="1.5"/>
  <rect x="68" y="590" width="104" height="20" rx="4" fill="#1a2d1a" stroke="#56d364" stroke-width="0.8"/>
  <text x="120" y="604" text-anchor="middle" fill="#56d364" font-size="10">Alice: [y] → trusted</text>

  <line x1="780" y1="575" x2="780" y2="590" stroke="#56d364" stroke-width="1.5"/>
  <rect x="728" y="590" width="104" height="20" rx="4" fill="#1a2d1a" stroke="#56d364" stroke-width="0.8"/>
  <text x="780" y="604" text-anchor="middle" fill="#56d364" font-size="10">Bob: [y] → trusted</text>

  <!-- ── Phase 5: Encrypted messaging ── -->
  <rect x="50" y="625" width="800" height="22" rx="4" fill="#161b22"/>
  <text x="450" y="640" text-anchor="middle" fill="#8b949e" font-size="11">Phase 5 — Encrypted Messaging  (4-layer security active)</text>

  <line x1="120" y1="660" x2="770" y2="660" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="430" y="653" text-anchor="middle" fill="#ffa657" font-size="11">room_seal( sign( encrypt( "Hello Bob!", pub_B_ecdh ) ) )  →</text>

  <line x1="780" y1="678" x2="130" y2="678" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="430" y="671" text-anchor="middle" fill="#ffa657" font-size="11">←  room_seal( sign( encrypt( "Hello Alice!", pub_A_ecdh ) ) )</text>

  <!-- Legend -->
  <rect x="50" y="700" width="800" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="66" y="716" fill="#e3b341" font-size="10">──  out-of-band</text>
  <text x="66" y="732" fill="#58a6ff" font-size="10">──  TCP/QUIC handshake</text>
  <text x="220" y="716" fill="#56d364" font-size="10">──  Noise encrypted</text>
  <text x="220" y="732" fill="#d2a8ff" font-size="10">──  Gossipsub control</text>
  <text x="390" y="716" fill="#ffa657" font-size="10">──  room-cipher AES-256 payload</text>
  <text x="390" y="732" fill="#8b949e" font-size="10">  Layer 2→4 active after trust approved</text>
  <text x="640" y="716" fill="#56d364" font-size="10">✓  signature verified</text>
  <text x="640" y="732" fill="#e3b341" font-size="10">[y]/[x]  manual trust decision</text>

</svg>
