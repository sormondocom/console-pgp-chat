<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">

  <!-- Defs -->
  <defs>
    <marker id="a-blue"   markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="a-green"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#56d364"/>
    </marker>
    <marker id="a-orange" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ffa657"/>
    </marker>
    <marker id="a-purple" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#d2a8ff"/>
    </marker>
    <marker id="a-white"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e6edf3"/>
    </marker>
    <marker id="a-yellow" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Message Transport — 4-Layer Security Stack</text>
  <text x="450" y="52" text-anchor="middle" fill="#8b949e" font-size="11">outer → inner on send  |  inner → outer on receive</text>

  <!-- ── Actor labels ── -->
  <rect x="20"  y="65" width="110" height="40" rx="7" fill="#1f6feb" fill-opacity="0.25" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="75"  y="89" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Alice</text>

  <rect x="155" y="65" width="120" height="40" rx="7" fill="#1a2d1a" stroke="#56d364" stroke-width="1.5"/>
  <text x="215" y="89" text-anchor="middle" fill="#56d364" font-size="12" font-weight="bold">Alice crypto</text>

  <rect x="340" y="65" width="120" height="40" rx="7" fill="#2b1a1a" stroke="#ffa657" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" fill="#ffa657" font-size="12" font-weight="bold">room_cipher</text>
  <text x="400" y="96" text-anchor="middle" fill="#8b949e" font-size="9">AES-256 sym</text>

  <rect x="510" y="65" width="110" height="40" rx="7" fill="#3d2b5e" fill-opacity="0.4" stroke="#8957e5" stroke-width="1.5"/>
  <text x="565" y="89" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Gossipsub</text>

  <rect x="660" y="65" width="120" height="40" rx="7" fill="#1a2d1a" stroke="#56d364" stroke-width="1.5"/>
  <text x="720" y="89" text-anchor="middle" fill="#56d364" font-size="12" font-weight="bold">Bob crypto</text>

  <rect x="800" y="65" width="80" height="40" rx="7" fill="#1f6feb" fill-opacity="0.25" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="840" y="89" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Bob</text>

  <!-- Lifelines -->
  <line x1="75"  y1="105" x2="75"  y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="215" y1="105" x2="215" y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="400" y1="105" x2="400" y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="565" y1="105" x2="565" y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="720" y1="105" x2="720" y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="840" y1="105" x2="840" y2="810" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ─────────────────── SENDER SIDE ─────────────────── -->
  <rect x="20" y="118" width="450" height="20" rx="4" fill="#161b22"/>
  <text x="245" y="131" text-anchor="middle" fill="#8b949e" font-size="10">Sender — compose, sign, encrypt, seal</text>

  <!-- Layer 4: Encrypt content -->
  <rect x="155" y="148" width="240" height="46" rx="5" fill="#1a2d1a" stroke="#56d364" stroke-width="1"/>
  <text x="275" y="164" text-anchor="middle" fill="#ffa657" font-size="10">Layer 4 — Content Encrypt</text>
  <text x="275" y="178" text-anchor="middle" fill="#8b949e" font-size="10">encrypt_for_recipients( body, [bob_ecdh_subkey] )</text>
  <line x1="75" y1="162" x2="155" y2="162" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <text x="112" y="155" text-anchor="middle" fill="#79c0ff" font-size="9">SendEncrypted</text>

  <!-- Layer 3: Sign -->
  <rect x="155" y="208" width="240" height="46" rx="5" fill="#1a2d1a" stroke="#56d364" stroke-width="1"/>
  <text x="275" y="224" text-anchor="middle" fill="#ffa657" font-size="10">Layer 3 — EdDSA Sign</text>
  <text x="275" y="238" text-anchor="middle" fill="#8b949e" font-size="10">sign_data( to_json(ChatMessage) , alice_secret )</text>
  <line x1="215" y1="194" x2="215" y2="208" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <!-- Result: SignedChatMessage -->
  <rect x="155" y="268" width="240" height="36" rx="5" fill="#161b22" stroke="#56d364" stroke-width="0.8"/>
  <text x="275" y="282" text-anchor="middle" fill="#e6edf3" font-size="10">SignedChatMessage {</text>
  <text x="275" y="296" text-anchor="middle" fill="#8b949e" font-size="10">  message: ChatMessage,  signature: Vec&lt;u8&gt; }</text>
  <line x1="215" y1="254" x2="215" y2="268" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <!-- Layer 2: room_cipher seal -->
  <rect x="310" y="318" width="180" height="46" rx="5" fill="#2b1a1a" stroke="#ffa657" stroke-width="1"/>
  <text x="400" y="334" text-anchor="middle" fill="#ffa657" font-size="10">Layer 2 — Room Cipher Seal</text>
  <text x="400" y="349" text-anchor="middle" fill="#8b949e" font-size="10">room_cipher::seal( json, passphrase )</text>
  <line x1="215" y1="304" x2="215" y2="310" stroke="#e6edf3" stroke-width="1.2"/>
  <line x1="215" y1="310" x2="355" y2="310" stroke="#e6edf3" stroke-width="1.2"/>
  <line x1="355" y1="310" x2="355" y2="318" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <!-- Layer 1: Gossipsub publish -->
  <rect x="483" y="318" width="164" height="46" rx="5" fill="#3d2b5e" fill-opacity="0.5" stroke="#8957e5" stroke-width="1"/>
  <text x="565" y="334" text-anchor="middle" fill="#d2a8ff" font-size="10">Layer 1 — Gossipsub Publish</text>
  <text x="565" y="349" text-anchor="middle" fill="#8b949e" font-size="10">Noise/QUIC transport encrypt</text>
  <line x1="490" y1="341" x2="483" y2="341" stroke="#ffa657" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- Publish arrow -->
  <line x1="647" y1="341" x2="660" y2="341" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- Wire label -->
  <rect x="20" y="378" width="860" height="20" rx="4" fill="#161b22"/>
  <text x="450" y="391" text-anchor="middle" fill="#8b949e" font-size="10">── wire: opaque TLS/QUIC or Noise ciphertext ──  (observer sees nothing)</text>

  <!-- ─────────────────── RECEIVER SIDE ─────────────────── -->
  <rect x="430" y="408" width="450" height="20" rx="4" fill="#161b22"/>
  <text x="655" y="421" text-anchor="middle" fill="#8b949e" font-size="10">Receiver — unseal, verify, decrypt, display</text>

  <!-- Layer 1: Gossipsub receive -->
  <rect x="483" y="438" width="164" height="36" rx="5" fill="#3d2b5e" fill-opacity="0.5" stroke="#8957e5" stroke-width="1"/>
  <text x="565" y="453" text-anchor="middle" fill="#d2a8ff" font-size="10">Layer 1 — Gossipsub Receive</text>
  <text x="565" y="466" text-anchor="middle" fill="#8b949e" font-size="10">Noise/QUIC transport decrypt</text>

  <!-- Layer 2: room_cipher open -->
  <rect x="580" y="488" width="200" height="46" rx="5" fill="#2b1a1a" stroke="#ffa657" stroke-width="1"/>
  <text x="680" y="504" text-anchor="middle" fill="#ffa657" font-size="10">Layer 2 — Room Cipher Open</text>
  <text x="680" y="519" text-anchor="middle" fill="#8b949e" font-size="10">room_cipher::open( bytes, passphrase )</text>
  <line x1="647" y1="474" x2="680" y2="474" stroke="#d2a8ff" stroke-width="1.2"/>
  <line x1="680" y1="474" x2="680" y2="488" stroke="#d2a8ff" stroke-width="1.2" marker-end="url(#a-orange)"/>

  <!-- Wrong passphrase drop note -->
  <text x="790" y="510" fill="#f85149" font-size="9">✗ wrong passphrase</text>
  <text x="790" y="522" fill="#f85149" font-size="9">   → drop silently</text>

  <!-- Layer 3: Verify signature -->
  <rect x="580" y="548" width="200" height="46" rx="5" fill="#1a2d1a" stroke="#56d364" stroke-width="1"/>
  <text x="680" y="564" text-anchor="middle" fill="#56d364" font-size="10">Layer 3 — Verify EdDSA Sig</text>
  <text x="680" y="578" text-anchor="middle" fill="#8b949e" font-size="10">verify_data( json, sig, sender_pub_key )</text>
  <line x1="680" y1="534" x2="680" y2="548" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <!-- Sig fail drop note -->
  <text x="790" y="570" fill="#f85149" font-size="9">✗ sig fail → drop</text>
  <text x="790" y="581" fill="#f85149" font-size="9">   never reaches UI</text>

  <!-- Layer 4: Decrypt content -->
  <rect x="580" y="608" width="200" height="46" rx="5" fill="#1a2d1a" stroke="#56d364" stroke-width="1"/>
  <text x="680" y="624" text-anchor="middle" fill="#ffa657" font-size="10">Layer 4 — Content Decrypt</text>
  <text x="680" y="638" text-anchor="middle" fill="#8b949e" font-size="10">decrypt_message( ciphertext, bob_secret )</text>
  <line x1="680" y1="594" x2="680" y2="608" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <!-- Display -->
  <rect x="580" y="668" width="200" height="36" rx="5" fill="#161b22" stroke="#56d364" stroke-width="0.8"/>
  <text x="680" y="683" text-anchor="middle" fill="#e6edf3" font-size="10">14:32 &lt;Alice ✓&gt; Hello, Bob!</text>
  <text x="680" y="697" text-anchor="middle" fill="#56d364" font-size="9">✓ = sig verified against trusted key</text>
  <line x1="680" y1="654" x2="680" y2="668" stroke="#e6edf3" stroke-width="1.2" marker-end="url(#a-white)"/>

  <line x1="780" y1="686" x2="800" y2="686" stroke="#56d364" stroke-width="1.5" marker-end="url(#a-blue)"/>

  <!-- ─────────────────── Legend / layer summary ─────────────────── -->
  <rect x="20" y="722" width="860" height="86" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="740" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold">Security layers (outer → inner on send)</text>

  <!-- L1 -->
  <rect x="36"  y="752" width="14" height="14" rx="2" fill="#8957e5" fill-opacity="0.6"/>
  <text x="56"  y="763" fill="#d2a8ff" font-size="10">L1  Noise (X25519) / QUIC TLS 1.3 — per-connection ephemeral session key</text>

  <!-- L2 -->
  <rect x="36"  y="772" width="14" height="14" rx="2" fill="#ffa657" fill-opacity="0.6"/>
  <text x="56"  y="783" fill="#ffa657" font-size="10">L2  room_cipher AES-256 — shared room passphrase (out-of-band);  wrong key = opaque binary blob</text>

  <!-- L3 -->
  <rect x="36"  y="792" width="14" height="14" rx="2" fill="#56d364" fill-opacity="0.6"/>
  <text x="56"  y="803" fill="#56d364" font-size="10">L3  EdDSA detached signature — long-term PGP key;  sig fail = message dropped before display</text>

  <!-- L4 -->
  <rect x="480" y="752" width="14" height="14" rx="2" fill="#58a6ff" fill-opacity="0.6"/>
  <text x="500" y="763" fill="#58a6ff" font-size="10">L4  PGP ECDH (Curve25519) — per-recipient;  only trusted peers can decrypt</text>

  <rect x="480" y="772" width="14" height="14" rx="2" fill="#f85149" fill-opacity="0.6"/>
  <text x="500" y="783" fill="#f85149" font-size="10">✗  Any layer failure → silently drop;  no error exposed to sender</text>

  <rect x="480" y="792" width="14" height="14" rx="2" fill="#56d364" fill-opacity="0.6"/>
  <text x="500" y="803" fill="#56d364" font-size="10">✓  All layers pass → display with verified badge</text>

</svg>
