name: Release

# Runs when a version tag (e.g. v1.2.3) is pushed, which GitHub also does
# automatically when you create a release through the web UI.
on:
  push:
    tags:
      - 'v*.*.*'

# Required to upload artifacts to the GitHub release.
permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pgp-chat.exe
            asset:  pgp-chat-windows-x86_64.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: pgp-chat
            asset:  pgp-chat-linux-x86_64

          - os: macos-latest       # Apple Silicon (M-series)
            target: aarch64-apple-darwin
            binary: pgp-chat
            asset:  pgp-chat-macos-arm64

          - os: macos-13           # Last Intel runner
            target: x86_64-apple-darwin
            binary: pgp-chat
            asset:  pgp-chat-macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p pgp-chat

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.asset }}

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
